<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hellas - Kala Nera</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <link rel="canonical" href="https://www.kalanera.gr/business/hellas.html" />
    <link rel="alternate" hreflang="el" href="https://www.kalanera.gr/business/hellas-el.html" />
    <style>
        body { 
            background-color: #fcfcf9; 
            font-family: 'Inter', sans-serif; 
            color: #333; 
            margin: 0;
            line-height: 1.6;
        }
        .nav-container { padding: 25px; max-width: 850px; margin: 0 auto; }
        .back-button { 
            text-decoration: none; 
            color: #556b2f; 
            font-weight: 600; 
            transition: 0.3s; 
        }
        .back-button:hover { color: #8b4513; }
        
        .biz-card-full { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 15px 35px rgba(0,0,0,0.05); 
            overflow: hidden;
            margin-bottom: 50px;
        }

        .header-image {
            width: 100%;
            height: 450px;
            object-fit: cover;
            display: block;
        }

        .content-padding { padding: 45px; }

        h1 { 
            margin: 0 0 15px 0; 
            font-size: 2.8rem; 
            font-weight: 800; 
            letter-spacing: -1px;
            color: #1a1a1a;
        }

        .meta-info {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            margin-bottom: 35px;
            font-size: 1.1rem;
            color: #555;
        }

        .meta-info i { margin-right: 8px; }
        .icon-cat { color: #556b2f; }
        .icon-loc { color: #d4a373; }

        .contact-box {
            background: rgba(85, 107, 47, 0.05);
            border-left: 4px solid #556b2f;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 40px;
        }

        .contact-box p { margin: 8px 0; font-size: 1.15rem; }
        .contact-box a { color: #556b2f; text-decoration: none; font-weight: 600; }

        .btn-visit { 
            background: #556b2f; 
            color: #fff !important; 
            padding: 16px 35px; 
            text-decoration: none; 
            border-radius: 50px; 
            display: inline-block; 
            font-weight: 600; 
            box-shadow: 0 4px 15px rgba(85, 107, 47, 0.3);
            transition: all 0.3s ease;
        }
        .btn-visit:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(85, 107, 47, 0.4);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>
    <div class="nav-container">
        <a href="../index.html" class="back-button">← Terug naar overzicht</a>
    </div>
    
    <main style="max-width: 850px; margin: 0 auto; padding: 0 20px;">
        <div class="biz-card-full">
            <img src="https://www.kalanera.gr/pix/hellas.jpg" alt="Hellas" class="header-image">
            
            <div class="content-padding">
                <h1>Hellas</h1>
                
                <div class="meta-info">
                    <span><i class="fa fa-tag icon-cat"></i><strong>Categorie:</strong> Camp</span>
                    <span><i class="fa fa-map-marker-alt icon-loc"></i><strong>Locatie:</strong> Kato Gatzea</span>
                </div>

                <div class="contact-box">
                    <p><strong>Telefoon:</strong> <a href="tel:+30 24230 22267">+30 24230 22267</a></p>
                    <p><strong>Email:</strong> <a href="mailto:info@campinghellas.gr">info@campinghellas.gr</a></p>
                </div>

                <a href="https://campinghellas.gr/" target="_blank" class="btn-visit">Bezoek website</a>
            </div>
        </div>
    </main>
</body>
</html>
