<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hellas - Kala Nera</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <link rel="canonical" href="https://www.kalanera.gr/business/hellas-el.html" />
    <link rel="alternate" hreflang="nl" href="https://www.kalanera.gr/business/hellas.html" />
    <style>
        body { 
            background-color: #f9fbf7; 
            font-family: 'Inter', sans-serif; 
            color: #33413b; 
            margin: 0;
            line-height: 1.6;
        }
        .nav-container { padding: 25px; max-width: 850px; margin: 0 auto; }
        .back-button { 
            text-decoration: none; 
            color: #5d6d4e; 
            font-weight: 600; 
            font-size: 0.95rem;
            transition: 0.3s; 
        }
        .back-button:hover { color: #8b4513; }
        
        .biz-card-full { 
            background: #ffffff; 
            border-radius: 24px; 
            border: 1px solid rgba(93, 109, 78, 0.15);
            box-shadow: 0 10px 40px rgba(93, 109, 78, 0.08); 
            overflow: hidden;
            margin-bottom: 50px;
        }

        .header-image {
            width: 100%;
            height: 400px;
            object-fit: cover;
            display: block;
        }

        .content-padding { padding: 40px; }

        h1 { 
            margin: 0 0 12px 0; 
            font-size: 2.6rem; 
            font-weight: 800; 
            color: #1a1f16;
            letter-spacing: -0.02em;
        }

        .meta-info {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }

        .meta-tag {
            background: #eef2e8;
            color: #5d6d4e;
            padding: 6px 14px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
        }

        .meta-tag i { margin-right: 8px; font-size: 0.85rem; }
        .meta-tag.location { background: #fdf5e6; color: #8b4513; }

        .contact-section {
            background: #f8f9f7;
            padding: 25px;
            border-radius: 18px;
            margin-bottom: 35px;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .contact-section p { margin: 10px 0; font-size: 1.1rem; font-weight: 500; }
        .contact-section a { color: #5d6d4e; text-decoration: none; border-bottom: 1px solid transparent; transition: 0.2s; }
        .contact-section a:hover { border-bottom-color: #5d6d4e; }

        .btn-visit { 
            background: #5d6d4e; 
            color: #ffffff !important; 
            padding: 16px 32px; 
            text-decoration: none; 
            border-radius: 16px; 
            display: inline-block; 
            font-weight: 700; 
            box-shadow: 0 6px 20px rgba(93, 109, 78, 0.25);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: none;
            cursor: pointer;
        }
        .btn-visit:hover { 
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(93, 109, 78, 0.35);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>
    <div class="nav-container">
        <a href="../index-el.html" class="back-button">← Πίσω στην επισκόπηση</a>
    </div>
    
    <main style="max-width: 850px; margin: 0 auto; padding: 0 20px;">
        <article class="biz-card-full">
            <img src="https://www.kalanera.gr/pix/hellas.jpg" alt="Hellas" class="header-image">
            
            <div class="content-padding">
                <div class="meta-info">
                    <div class="meta-tag">
                        <i class="fa fa-tag"></i>Καμπινγκ
                    </div>
                    <div class="meta-tag location">
                        <i class="fa fa-map-marker-alt"></i>Κάτω Γατζέα
                    </div>
                </div>

                <h1>Hellas</h1>

                <div class="contact-section">
                    <p><strong>Τηλέφωνο:</strong> <a href="tel:+30 24230 22267">+30 24230 22267</a></p>
                    <p><strong>Email:</strong> <a href="mailto:info@campinghellas.gr">info@campinghellas.gr</a></p>
                </div>

                <a href="https://campinghellas.gr/" target="_blank" class="btn-visit">
                    <i class="fa fa-external-link-alt" style="margin-right:10px; font-size:0.9rem;"></i>Επισκεφθείτε την ιστοσελίδα
                </a>
            </div>
        </article>
    </main>
</body>
</html>
