<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hellas - Kala Nera</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        body { 
            background: url('../pix/bg.webp') no-repeat center center fixed; 
            background-size: cover; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            min-height: 100vh; 
            color: #333;
        }
        .container { width: 100%; max-width: 800px; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        
        /* De Glossy Back Button */
        .back-nav { margin-bottom: 25px; padding-top: 10px; }
        .back-button-glossy { 
            text-decoration: none; 
            color: white !important; 
            background: rgba(93, 109, 78, 0.85);
            padding: 10px 20px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            font-weight: 600;
            display: inline-block;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* De Card styling conform main page */
        .biz-card-detail { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            overflow: hidden;
            width: 100%;
            margin-bottom: 50px;
        }

        .header-image { width: 100%; height: 350px; object-fit: cover; display: block; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .content-padding { padding: 30px; }

        h1 { margin: 10px 0 15px 0; font-size: 2.4rem; font-weight: 800; color: #1a1a1a; letter-spacing: -1px; }

        /* Meta tags styling */
        .meta-container { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .meta-pill { 
            background: rgba(93, 109, 78, 0.1); 
            color: #5d6d4e; 
            padding: 6px 15px; 
            border-radius: 50px; 
            font-weight: 700; 
            font-size: 0.9rem; 
        }

        /* Contact Section */
        .contact-info { 
            background: rgba(255, 255, 255, 0.5); 
            border-radius: 15px; 
            padding: 20px; 
            margin: 25px 0;
            border: 1px solid rgba(93, 109, 78, 0.1);
        }
        .contact-info p { margin: 10px 0; font-size: 1.1rem; }
        .contact-info i { color: #5d6d4e; width: 25px; }
        .contact-info a { color: inherit; text-decoration: none; font-weight: 600; }

        /* Glossy Visit Button */
        .btn-visit-glossy { 
            background: #5d6d4e !important; 
            color: white !important; 
            padding: 15px 35px; 
            text-decoration: none; 
            border-radius: 50px; 
            display: block;
            text-align: center;
            font-weight: 700; 
            box-shadow: 0 6px 20px rgba(93, 109, 78, 0.4);
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .btn-visit-glossy:hover { transform: translateY(-2px); filter: brightness(1.1); }
    </style>
</head>
<body>
    <div class="container">
        <nav class="back-nav">
            <a href="../index-el.html" class="back-button-glossy">← Back</a>
        </nav>
        
        <main class="biz-card-detail">
            <img src="https://www.kalanera.gr/pix/hellas.jpg" alt="Hellas" class="header-image">
            <div class="content-padding">
                <div class="meta-container">
                    <span class="meta-pill"><i class="fa fa-tag"></i> Καμπινγκ</span>
                    <span class="meta-pill" style="background:rgba(139,69,19,0.1); color:#8b4513;"><i class="fa fa-map-marker-alt"></i> Κάτω Γατζέα</span>
                </div>
                
                <h1>Hellas</h1>

                <div class="contact-info">
                    <p><i class="fa fa-phone"></i> <a href="tel:+30 24230 22267">+30 24230 22267</a></p>
                    <p><i class="fa fa-envelope"></i> <a href="mailto:info@campinghellas.gr">info@campinghellas.gr</a></p>
                </div>

                <a href="https://campinghellas.gr/" target="_blank" class="btn-visit-glossy">
                    <i class="fa fa-external-link-alt" style="margin-right:8px;"></i>Visit Website
                </a>
            </div>
        </main>
    </div>
</body>
</html>
