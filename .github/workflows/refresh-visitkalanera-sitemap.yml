# Sitemap-snapshot voor n8n-vergelijking — fetch vanaf GitHub IP, niet vanaf n8n-server.
name: Refresh visitkalanera sitemap snapshot

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch sitemap and write snapshot
        run: node scripts/refresh-visitkalanera-sitemap.mjs

      - name: Commit snapshot if changed
        run: |
          if git diff --quiet -- data/visitkalanera-sitemap.json; then
            echo "Geen wijzigingen in snapshot."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/visitkalanera-sitemap.json
          git commit -m "data: refresh visitkalanera sitemap snapshot"
          git push
