  <style>
    html { scroll-behavior: smooth; }
    body { 
      font-family: 'Inter', sans-serif;
      background-color: #fdfaf5;
      color: #3a1c10;
    }
    .font-display { font-family: 'Cormorant Garamond', Georgia, serif; }
    .text-balance { text-wrap: balance; }
    
    /* Smooth transitions */
    .nav-link { position: relative; }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background-color: currentColor;
      transition: width 0.3s ease;
    }
    .nav-link:hover::after { width: 100%; }
    
    /* Mobile menu animation */
    .mobile-menu {
      transform: translateX(100%);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .mobile-menu.open { transform: translateX(0); }
    
    /* Image hover effects */
    .img-zoom { transition: transform 0.6s ease; }
    .img-zoom:hover { transform: scale(1.05); }
    
    /* Language toggle */
    .lang-btn {
      transition: all 0.2s ease;
    }
    .lang-btn.active {
      background-color: #96422a;
      color: white;
    }
    
    /* Fade in animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in {
      animation: fadeIn 0.8s ease forwards;
    }
    
    /* Parallax-like effect for hero */
    .hero-bg {
      background-attachment: scroll;
    }
    @media (min-width: 768px) {
      .hero-bg {
        background-attachment: fixed;
      }
    }

          setScrolled(window.scrollY > 50);
        };
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      useEffect(() => {
        document.documentElement.lang = lang;
      }, [lang]);

      const toggleLang = (newLang) => {
        setLang(newLang);
        setMenuOpen(false);
      };

      return html`

        <nav class="fixed top-0 left-0 right-0 z-50 transition-all duration-500 ${scrolled ? 'bg-cream-50/95 backdrop-blur-sm shadow-sm' : 'bg-transparent'}">

                  <button 
                    onClick=${() => toggleLang('gr')}

              </button>

                    alt="Pelion autumn forest" 
                    class="w-full h-full object-cover"
                  />
                </div>
              </div>

              <div class="space-y-12 lg:pt-24">
                ${t.experience.items.map((item, i) => html`
                  <div key=${i} class="border-l-2 border-teak-200 pl-8 py-4 hover:border-olive-600 transition-colors">
                    <span class="text-5xl font-display text-teak-200 mb-4 block">0${i + 1}</span>
                    <h3 class="font-display text-2xl text-olive-900 mb-3">${item.title}</h3>
                    <p class="text-teak-700 leading-relaxed">${item.desc}</p>
                  </div>
                `)}
              </div>
            </div>
          </div>
        </section>

        <!-- Location Section -->
        <section id="location" class="py-24 lg:py-32 text-white" style="background-color:#673224;">
          <div class="max-w-7xl mx-auto px-6">
            <div class="grid lg:grid-cols-2 gap-16 items-center">
              <div>
                <span class="text-xs tracking-[0.2em] uppercase text-teak-300 mb-4 block">${t.location.label}</span>
                <h2 class="font-display text-4xl lg:text-5xl mb-8 leading-tight">
                  ${t.location.title}
                </h2>
                <p class="text-cream-300 leading-relaxed mb-8">
                  ${t.location.description}
                </p>
                <div class="rounded-xl p-6 mb-8" style="background-color:rgba(55,23,16,0.4);">
                  <p class="whitespace-pre-line text-cream-200 mb-4">${t.location.address}</p>
                  <a href="https://maps.google.com" target="_blank" rel="noopener" class="inline-flex items-center gap-2 text-sm text-cream-200 hover:text-white">
                    ${t.location.directions}
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                    </svg>
                  </a>
                </div>
              </div>
              <div class="aspect-square lg:aspect-[4/3] overflow-hidden rounded-2xl">
                <img 
                  src="https://images.unsplash.com/photo-1530841377377-3ff06c0ca713?auto=format&fit=crop&w=1200&q=80" 
                  alt="Milina harbor" 
                  class="w-full h-full object-cover"
                />
              </div>
            </div>
          </div>
        </section>

        <!-- Contact Section -->
        <section id="contact" class="py-24 lg:py-32 px-6" style="background-color:#fdfaf5;">
          <div class="max-w-4xl mx-auto text-center mb-16">
            <h2 class="font-display text-4xl lg:text-6xl text-olive-900 mb-6">
              ${t.contact.title}
            </h2>
            <p class="text-teak-700 max-w-xl mx-auto leading-relaxed">
              ${t.contact.description}
            </p>
          </div>

          <div class="max-w-2xl mx-auto">
            <div class="flex flex-col sm:flex-row justify-center gap-8 mb-16 text-center">
              <a href="mailto:hello@villaelia.gr" class="text-olive-700 hover:text-olive-900">
                ${t.contact.email}
              </a>
              <span class="hidden sm:block text-teak-300">|</span>
              <a href="tel:+302423065000" class="text-olive-700 hover:text-olive-900">
                ${t.contact.phone}
              </a>
            </div>

            <form class="space-y-6" onSubmit=${(e) => e.preventDefault()}>
              <div class="grid sm:grid-cols-2 gap-6">
                <div>
                  <label class="block text-xs tracking-wider text-teak-600 uppercase mb-2">${t.contact.form.name}</label>
                  <input 
                    type="text" 
                    class="w-full px-4 py-3 bg-cream-100 border border-teak-200 rounded-lg focus:outline-none focus:border-olive-600 transition-colors text-olive-900"
                  />
                </div>
                <div>
                  <label class="block text-xs tracking-wider text-teak-600 uppercase mb-2">${t.contact.form.email}</label>
                  <input 
                    type="email" 
                    class="w-full px-4 py-3 bg-cream-100 border border-teak-200 rounded-lg focus:outline-none focus:border-olive-600 transition-colors text-olive-900"
                  />
                </div>
              </div>
              <div>
                <label class="block text-xs tracking-wider text-teak-600 uppercase mb-2">${t.contact.form.message}</label>
                <textarea 
                  rows="5" 
                  class="w-full px-4 py-3 bg-cream-100 border border-teak-200 rounded-lg focus:outline-none focus:border-olive-600 transition-colors resize-none text-olive-900"
                ></textarea>
              </div>
              <div class="text-center">
                <button 
                  type="submit" 
                  class="px-10 py-4 bg-olive-700 text-white rounded-full hover:bg-olive-800 transition-colors text-sm tracking-wider"
                >
                  ${t.contact.form.send}
                </button>
              </div>
            </form>
          </div>
        </section>

        <!-- Footer -->
        <footer class="py-16 text-teak-400" style="background-color:#1e0d08;">
          <div class="max-w-7xl mx-auto px-6">
            <div class="flex flex-col lg:flex-row justify-between items-center gap-8">
              <div class="text-center lg:text-left">
                <p class="font-display text-2xl text-cream-200 mb-2">Villa Elia</p>
                <p class="text-sm">${t.footer.tagline}</p>
              </div>
              
              <div class="flex items-center gap-6">
                ${t.footer.links.map(link => html`
                  <a key=${link} href="#" class="text-sm hover:text-cream-300 transition-colors">${link}</a>
                `)}
              </div>
            </div>
            
            <div class="border-t mt-12 pt-8 text-center text-xs text-teak-600" style="border-color:#3a1208;">
              ${t.footer.copyright}
            </div>
          </div>
        </footer>
      `;
    }

    // Render the app
    render(html`<${App} />`, document.getElementById('app'));
  </script>
</body>
</html>
