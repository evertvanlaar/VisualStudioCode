<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#4a6c4a" />
  <title>Offline · Kala Nera</title>
  <style>
    :root{
      --bg:#f4f6ef;
      --card:#ffffff;
      --text:#0f172a;
      --muted:rgba(71,85,105,0.86);
      --green:#4a6c4a;
      --border:rgba(15,23,42,0.10);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .wrap{
      max-width:980px;
      margin:28px auto;
      padding:0 16px;
    }
    .card{
      background:linear-gradient(180deg,rgba(255,255,255,0.92) 0%, rgba(255,255,255,0.78) 100%);
      border:1px solid var(--border);
      border-radius:18px;
      padding:18px 16px;
      box-shadow:0 10px 30px rgba(2,6,23,0.06);
    }
    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:12px;
    }
    .logo{
      width:44px;height:44px;border-radius:12px;
      border:1px solid rgba(15,23,42,0.10);
      background:rgba(255,255,255,0.8);
      overflow:hidden;
      flex:0 0 auto;
    }
    .logo img{width:100%;height:100%;object-fit:cover;display:block}
    .brand-title{
      display:flex;flex-direction:column;min-width:0;
    }
    .brand-title strong{font-size:14px;letter-spacing:0.06em;text-transform:uppercase;color:rgba(71,85,105,0.9)}
    .brand-title span{font-size:12px;color:var(--muted)}
    h1{
      margin:10px 0 8px;
      font-size:20px;
      font-weight:900;
      letter-spacing:-0.02em;
      line-height:1.15;
    }
    p{margin:0 0 10px;color:var(--muted);font-weight:650;line-height:1.45}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
    .btn{
      appearance:none;
      border:1px solid rgba(74,108,74,0.32);
      background:linear-gradient(180deg, rgba(74,108,74,0.22) 0%, rgba(74,108,74,0.12) 100%);
      color:#2d5a27;
      border-radius:12px;
      padding:10px 12px;
      font:inherit;
      font-size:13px;
      font-weight:900;
      cursor:pointer;
    }
    .btn:active{transform:scale(0.99)}
    .link{
      border:1px solid rgba(15,23,42,0.10);
      background:rgba(255,255,255,0.8);
      color:rgba(15,23,42,0.85);
    }
    .hint{margin-top:10px;font-size:12px;color:rgba(71,85,105,0.8)}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" role="status" aria-live="polite">
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <img src="/icon-192.png" alt="" />
        </div>
        <div class="brand-title">
          <strong>Kala Nera</strong>
          <span>Offline mode</span>
        </div>
      </div>

      <h1>You’re offline</h1>
      <p>
        We couldn’t load the latest data. If you’ve opened this page before, most content should still be available from cache.
      </p>

      <div class="actions">
        <button class="btn" type="button" onclick="location.reload()">Try again</button>
        <a class="btn link" href="/index.html">Go to Home</a>
        <a class="btn link" href="/bus.html">Bus timetable</a>
      </div>

      <div class="hint">Tip: reconnect, then pull-to-refresh.</div>
    </div>
  </div>
</body>
</html>
